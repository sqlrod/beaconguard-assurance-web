<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="arch-title arch-desc">
  <title id="arch-title">BeaconGuard System Architecture</title>
  <desc id="arch-desc">BeaconGuard architecture showing governed release management, deterministic runtime enforcement, allow and deny outcomes, and verifiable decision evidence.</desc>

  <defs>
    <marker id="arrow-neutral" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L10,4 L0,8 Z" fill="#8291A5"/>
    </marker>
    <marker id="arrow-allow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L10,4 L0,8 Z" fill="#4F8F70"/>
    </marker>
    <marker id="arrow-deny" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L10,4 L0,8 Z" fill="#B65A62"/>
    </marker>
  </defs>

  <rect width="1600" height="900" fill="#0B1220"/>

  <!-- ==================== MANAGEMENT PLANE ==================== -->
  <rect x="40" y="40" width="1520" height="220" rx="8" fill="#111B2A" stroke="#40536A" stroke-width="1.5"/>
  <text x="60" y="72" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" fill="#E7ECF3">MANAGEMENT PLANE</text>

  <rect x="60" y="90" width="1480" height="150" rx="6" fill="#0D1624" stroke="#40536A" stroke-width="1.5"/>
  <text x="80" y="118" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="600" fill="#E7ECF3">BeaconGuard Control Plane</text>

  <rect x="80" y="136" width="248" height="84" rx="6" fill="#0D1624" stroke="#40536A" stroke-width="1.5"/>
  <text x="204" y="170" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="600" fill="#E7ECF3">Compliance Playbook</text>
  <text x="204" y="194" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="600" fill="#E7ECF3">Definition</text>

  <rect x="368" y="136" width="248" height="84" rx="6" fill="#0D1624" stroke="#40536A" stroke-width="1.5"/>
  <text x="492" y="170" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="600" fill="#E7ECF3">Validation &amp;</text>
  <text x="492" y="194" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="600" fill="#E7ECF3">Compilation</text>

  <rect x="656" y="136" width="248" height="84" rx="6" fill="#0D1624" stroke="#40536A" stroke-width="1.5"/>
  <text x="780" y="182" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="600" fill="#E7ECF3">Approval</text>

  <rect x="944" y="136" width="248" height="84" rx="6" fill="#0D1624" stroke="#40536A" stroke-width="1.5"/>
  <text x="1068" y="170" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="600" fill="#E7ECF3">Signed Immutable</text>
  <text x="1068" y="194" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="600" fill="#E7ECF3">Release Artifact</text>

  <rect x="1232" y="136" width="280" height="84" rx="6" fill="#0D1624" stroke="#40536A" stroke-width="1.5"/>
  <text x="1372" y="170" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="600" fill="#E7ECF3">Controlled Release</text>
  <text x="1372" y="194" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="600" fill="#E7ECF3">Distribution</text>

  <path d="M328 178 H358" fill="none" stroke="#8291A5" stroke-width="2" marker-end="url(#arrow-neutral)"/>
  <path d="M616 178 H646" fill="none" stroke="#8291A5" stroke-width="2" marker-end="url(#arrow-neutral)"/>
  <path d="M904 178 H934" fill="none" stroke="#8291A5" stroke-width="2" marker-end="url(#arrow-neutral)"/>
  <path d="M1192 178 H1222" fill="none" stroke="#8291A5" stroke-width="2" marker-end="url(#arrow-neutral)"/>

  <!-- Dashed distribution to release verification (side path) -->
  <path d="M1372 220 V250 H1440 V420" fill="none" stroke="#8291A5" stroke-width="2" stroke-dasharray="6 5" marker-end="url(#arrow-neutral)"/>

  <!-- ==================== RUNTIME INPUT FLOW (centered at x=800) ==================== -->
  <text x="60" y="290" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" fill="#E7ECF3">RUNTIME DATA PLANE</text>

  <rect x="570" y="300" width="460" height="50" rx="6" fill="#0D1624" stroke="#40536A" stroke-width="1.5"/>
  <text x="800" y="322" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="600" fill="#E7ECF3">Enterprise Application</text>
  <text x="800" y="342" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="600" fill="#E7ECF3">/ Workflow</text>

  <path d="M800 350 V362" fill="none" stroke="#8291A5" stroke-width="2" marker-end="url(#arrow-neutral)"/>

  <rect x="570" y="364" width="460" height="48" rx="6" fill="#0D1624" stroke="#40536A" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="800" y="384" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="600" fill="#E7ECF3">System Connector</text>
  <text x="800" y="403" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" fill="#9EABBC">Optional protocol and context mapping</text>

  <path d="M800 412 V418" fill="none" stroke="#8291A5" stroke-width="2" marker-end="url(#arrow-neutral)"/>

  <!-- ==================== RUNTIME CONTROL BOUNDARY (centered at x=800) ==================== -->
  <rect x="310" y="420" width="980" height="170" rx="8" fill="#111B2A" stroke="#5B9EE8" stroke-width="2"/>
  <text x="330" y="452" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="600" fill="#E7ECF3">BeaconGuard Runtime Control Boundary</text>

  <rect x="334" y="470" width="280" height="100" rx="6" fill="#0D1624" stroke="#40536A" stroke-width="1.5"/>
  <text x="474" y="508" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="600" fill="#E7ECF3">Request Validation &amp;</text>
  <text x="474" y="534" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="600" fill="#E7ECF3">Context Normalization</text>

  <rect x="660" y="470" width="280" height="100" rx="6" fill="#0D1624" stroke="#40536A" stroke-width="1.5"/>
  <text x="800" y="508" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="600" fill="#E7ECF3">Trust, Freshness &amp;</text>
  <text x="800" y="534" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="600" fill="#E7ECF3">Replay Checks</text>

  <rect x="986" y="470" width="280" height="100" rx="6" fill="#0D1624" stroke="#40536A" stroke-width="1.5"/>
  <text x="1126" y="508" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="600" fill="#E7ECF3">Deterministic Playbook</text>
  <text x="1126" y="534" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="600" fill="#E7ECF3">Evaluation</text>

  <path d="M614 520 H650" fill="none" stroke="#8291A5" stroke-width="2" marker-end="url(#arrow-neutral)"/>
  <path d="M940 520 H976" fill="none" stroke="#8291A5" stroke-width="2" marker-end="url(#arrow-neutral)"/>

  <!-- Release stack (~40px right-edge clearance) -->
  <rect x="1320" y="420" width="240" height="70" rx="6" fill="#0D1624" stroke="#40536A" stroke-width="1.5"/>
  <text x="1440" y="448" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="600" fill="#E7ECF3">Release Verification</text>
  <text x="1440" y="470" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="600" fill="#E7ECF3">&amp; Activation</text>

  <path d="M1440 490 V508" fill="none" stroke="#8291A5" stroke-width="2" marker-end="url(#arrow-neutral)"/>

  <rect x="1320" y="510" width="240" height="60" rx="6" fill="#0D1624" stroke="#40536A" stroke-width="1.5"/>
  <text x="1440" y="547" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="600" fill="#E7ECF3">Active Verified Release</text>

  <path d="M1320 540 H1255" fill="none" stroke="#8291A5" stroke-width="2" marker-end="url(#arrow-neutral)"/>

  <!-- ==================== DECISION RESULT (centered at x=800) ==================== -->
  <path d="M1126 570 V595 H800 V618" fill="none" stroke="#8291A5" stroke-width="2" marker-end="url(#arrow-neutral)"/>
  <rect x="550" y="620" width="500" height="55" rx="6" fill="#0D1624" stroke="#40536A" stroke-width="1.5"/>
  <text x="800" y="655" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="600" fill="#E7ECF3">Deterministic Decision Result</text>

  <!-- Short horizontals from decision edges to nearer outcome columns -->
  <path d="M550 675 H380" fill="none" stroke="#4F8F70" stroke-width="2"/>
  <path d="M1050 675 H1220" fill="none" stroke="#B65A62" stroke-width="2"/>

  <!-- ALLOW (center 380) -->
  <path d="M380 675 V718" fill="none" stroke="#4F8F70" stroke-width="2" marker-end="url(#arrow-allow)"/>
  <text x="380" y="742" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#4F8F70">ALLOW</text>
  <path d="M380 748 V753" fill="none" stroke="#4F8F70" stroke-width="2" marker-end="url(#arrow-allow)"/>
  <rect x="200" y="755" width="360" height="70" rx="6" fill="#0D1624" stroke="#4F8F70" stroke-width="2"/>
  <text x="380" y="780" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="600" fill="#E7ECF3">Governed AI, API or</text>
  <text x="380" y="802" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="600" fill="#E7ECF3">Automated System</text>
  <text x="380" y="818" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" fill="#9EABBC">Forward approved request</text>

  <!-- RECORD (centered at x=800) -->
  <path d="M800 675 V722" fill="none" stroke="#8291A5" stroke-width="2" marker-end="url(#arrow-neutral)"/>
  <rect x="600" y="730" width="400" height="104" rx="6" fill="#0D1624" stroke="#40536A" stroke-width="1.5"/>
  <text x="800" y="760" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="600" fill="#E7ECF3">Verifiable Decision Record</text>
  <text x="800" y="786" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" fill="#9EABBC">Decision context, release identity,</text>
  <text x="800" y="808" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" fill="#9EABBC">control result, and outcome</text>

  <!-- DENY (center 1220) -->
  <path d="M1220 675 V718" fill="none" stroke="#B65A62" stroke-width="2" marker-end="url(#arrow-deny)"/>
  <text x="1220" y="742" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#B65A62">DENY</text>
  <path d="M1220 748 V753" fill="none" stroke="#B65A62" stroke-width="2" marker-end="url(#arrow-deny)"/>
  <rect x="1040" y="755" width="360" height="70" rx="6" fill="#0D1624" stroke="#B65A62" stroke-width="2"/>
  <text x="1220" y="783" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="600" fill="#E7ECF3">Execution Prevented</text>
  <text x="1220" y="807" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" fill="#9EABBC">Fail-closed. No downstream execution.</text>

  <!-- ==================== EVIDENCE (centered component) ==================== -->
  <path d="M380 825 V870 H500" fill="none" stroke="#4F8F70" stroke-width="2" marker-end="url(#arrow-allow)"/>
  <path d="M800 834 V843" fill="none" stroke="#8291A5" stroke-width="2" marker-end="url(#arrow-neutral)"/>
  <path d="M1220 825 V870 H1100" fill="none" stroke="#B65A62" stroke-width="2" marker-end="url(#arrow-deny)"/>

  <rect x="500" y="845" width="600" height="50" rx="6" fill="#0D1624" stroke="#40536A" stroke-width="1.5"/>
  <text x="800" y="866" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="600" fill="#E7ECF3">Evidence, Replay &amp; Verification</text>
  <text x="800" y="886" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" fill="#9EABBC">Integrity-protected decision evidence</text>
</svg>
