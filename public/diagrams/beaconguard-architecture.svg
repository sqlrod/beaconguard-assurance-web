<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 860" role="img" aria-label="BeaconGuard fintech control boundary architecture">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,4 L0,8" fill="none" stroke="#64748b" stroke-width="2" />
    </marker>
    <marker id="arrow-amber" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,4 L0,8" fill="none" stroke="#fb923c" stroke-width="2" />
    </marker>
  </defs>

  <rect x="0" y="0" width="980" height="760" fill="#070b14" />

  <text x="490" y="58" text-anchor="middle" fill="#93c5fd" font-size="21" font-family="Arial, Helvetica, sans-serif" font-weight="700">
    BeaconGuard control-boundary architecture
  </text>

  <rect x="310" y="82" width="360" height="60" rx="10" fill="#0f172a" stroke="#1d4ed8" stroke-width="2" />
  <text x="490" y="112" text-anchor="middle" fill="#93c5fd" font-size="16" font-family="Arial, Helvetica, sans-serif" font-weight="600">
    Financial application
  </text>
  <text x="490" y="130" text-anchor="middle" fill="#cbd5e1" font-size="12" font-family="Arial, Helvetica, sans-serif">
    Request path
  </text>

  <line x1="490" y1="142" x2="490" y2="165" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)" />

  <rect x="320" y="165" width="340" height="60" rx="10" fill="#0b1220" stroke="#0ea5e9" stroke-width="2" />
  <text x="490" y="188" text-anchor="middle" fill="#93c5fd" font-size="15" font-family="Arial, Helvetica, sans-serif" font-weight="600">
    Compatibility layer
  </text>
  <text x="490" y="205" text-anchor="middle" fill="#cbd5e1" font-size="11" font-family="Arial, Helvetica, sans-serif">
    Optional for non-native clients
  </text>

  <line x1="490" y1="225" x2="490" y2="250" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)" />

  <rect x="80" y="230" width="820" height="280" rx="14" fill="#0b1220" stroke="#334155" stroke-width="2" />
  <text x="490" y="258" text-anchor="middle" fill="#93c5fd" font-size="15" font-family="Arial, Helvetica, sans-serif" font-weight="600">
    BeaconGuard control boundary
  </text>

  <rect x="120" y="292" width="320" height="170" rx="10" fill="#0c1b33" stroke="#1d4ed8" stroke-width="2" />
  <text x="280" y="314" text-anchor="middle" fill="#93c5fd" font-size="15" font-family="Arial, Helvetica, sans-serif" font-weight="600">
    Policy control plane
  </text>
  <text x="280" y="342" text-anchor="middle" fill="#cbd5e1" font-size="12" font-family="Arial, Helvetica, sans-serif">Policy definition</text>
  <text x="280" y="360" text-anchor="middle" fill="#cbd5e1" font-size="12" font-family="Arial, Helvetica, sans-serif">Policy packaging</text>
  <text x="280" y="378" text-anchor="middle" fill="#cbd5e1" font-size="12" font-family="Arial, Helvetica, sans-serif">Policy distribution</text>

  <rect x="540" y="292" width="320" height="170" rx="10" fill="#071f2f" stroke="#0ea5e9" stroke-width="2" />
  <text x="700" y="314" text-anchor="middle" fill="#93c5fd" font-size="15" font-family="Arial, Helvetica, sans-serif" font-weight="600">
    Deterministic enforcement runtime
  </text>
  <text x="700" y="342" text-anchor="middle" fill="#cbd5e1" font-size="12" font-family="Arial, Helvetica, sans-serif">Request-context normalization</text>
  <text x="700" y="360" text-anchor="middle" fill="#cbd5e1" font-size="12" font-family="Arial, Helvetica, sans-serif">Policy evaluation</text>
  <text x="700" y="394" text-anchor="middle" fill="#f59e0b" font-size="14" font-family="Arial, Helvetica, sans-serif" font-weight="700">Decision gate: allow / deny</text>

  <line x1="440" y1="377" x2="540" y2="377" stroke="#60a5fa" stroke-width="2" marker-end="url(#arrow)" />
  <text x="490" y="404" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="Arial, Helvetica, sans-serif">Control handoff</text>

  <path d="M332 544 L332 595" fill="none" stroke="#fb923c" stroke-width="2" marker-end="url(#arrow-amber)" />
  <text x="236" y="526" text-anchor="start" fill="#fdba74" font-size="10" font-family="Arial, Helvetica, sans-serif">Fail-closed path</text>
  <text x="236" y="540" text-anchor="start" fill="#fdba74" font-size="10" font-family="Arial, Helvetica, sans-serif">Malformed / missing / out-of-bounds</text>

  <line x1="490" y1="510" x2="490" y2="620" stroke="#0f766e" stroke-width="2" marker-end="url(#arrow)" />
  <text x="505" y="596" fill="#94a3b8" font-size="10" font-family="Arial, Helvetica, sans-serif">Evidence path</text>

  <rect x="250" y="620" width="480" height="92" rx="10" fill="#0a1b2f" stroke="#0f766e" stroke-width="2" />
  <text x="490" y="642" text-anchor="middle" fill="#93c5fd" font-size="16" font-family="Arial, Helvetica, sans-serif" font-weight="600">
    Evidence and review output
  </text>
  <text x="490" y="663" text-anchor="middle" fill="#a7f3d0" font-size="12" font-family="Arial, Helvetica, sans-serif">
    Evidence record for review
  </text>
  <text x="490" y="679" text-anchor="middle" fill="#cbd5e1" font-size="12" font-family="Arial, Helvetica, sans-serif">
    Decision context, policy identity, outcomes
  </text>

  <line x1="490" y1="712" x2="490" y2="738" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)" />

  <rect x="310" y="738" width="360" height="68" rx="10" fill="#1e1b4b" stroke="#7c3aed" stroke-width="2" />
  <text x="490" y="763" text-anchor="middle" fill="#ddd6fe" font-size="16" font-family="Arial, Helvetica, sans-serif" font-weight="600">
    AI / Model endpoint
  </text>
  <text x="490" y="780" text-anchor="middle" fill="#cbd5e1" font-size="11" font-family="Arial, Helvetica, sans-serif">
    Executes only approved requests
  </text>

</svg>
