<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 620" role="img" aria-label="BeaconGuard Assurance architecture v2">
  <rect x="0" y="0" width="980" height="620" fill="#ffffff"/>

  <!-- Upstream Systems -->
  <rect x="290" y="30" width="400" height="70" rx="8" fill="#e5e7eb" stroke="#374151" stroke-width="2"/>
  <text x="490" y="62" text-anchor="middle" font-size="16" fill="#111827">
    Regulated Applications
  </text>
  <text x="490" y="82" text-anchor="middle" font-size="12" fill="#374151">
