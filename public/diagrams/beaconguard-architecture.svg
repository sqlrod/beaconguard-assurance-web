  </text>

  <!-- BeaconGuard Boundary -->
  <rect x="90" y="130" width="800" height="330" rx="12" fill="none" stroke="#1f2937" stroke-width="2"/>
  <text x="490" y="160" text-anchor="middle" font-size="18" fill="#1f2937">
    BeaconGuard Assurance
  </text>

  <!-- Control Plane Group -->
  <rect x="120" y="190" width="320" height="200" rx="10" fill="#eef2ff" stroke="#3730a3" stroke-width="2"/>
  <text x="280" y="215" text-anchor="middle" font-size="14" fill="#312e81">
    Policy Control Plane
  </text>

  <rect x="150" y="235" width="260" height="40" rx="6" fill="#ffffff" stroke="#4338ca" stroke-width="1.5"/>
  <text x="280" y="260" text-anchor="middle" font-size="12" fill="#1e1b4b">
    Policy Authoring &amp; Versioning
  </text>

  <rect x="150" y="285" width="260" height="40" rx="6" fill="#ffffff" stroke="#4338ca" stroke-width="1.5"/>
  <text x="280" y="310" text-anchor="middle" font-size="12" fill="#1e1b4b">
    Signed Policy Snapshots
  </text>

  <rect x="150" y="335" width="260" height="40" rx="6" fill="#ffffff" stroke="#4338ca" stroke-width="1.5"/>
  <text x="280" y="360" text-anchor="middle" font-size="12" fill="#1e1b4b">
    Distribution &amp; Attestation
  </text>

  <!-- Enforcement Group -->
  <rect x="520" y="190" width="320" height="200" rx="10" fill="#ecfeff" stroke="#155e75" stroke-width="2"/>
  <text x="680" y="215" text-anchor="middle" font-size="14" fill="#164e63">
