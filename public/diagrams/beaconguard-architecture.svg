  </text>

  <rect x="550" y="235" width="260" height="40" rx="6" fill="#ffffff" stroke="#0891b2" stroke-width="1.5"/>
  <text x="680" y="260" text-anchor="middle" font-size="12" fill="#083344">
    Request Normalization
  </text>

  <rect x="550" y="285" width="260" height="40" rx="6" fill="#ffffff" stroke="#0891b2" stroke-width="1.5"/>
  <text x="680" y="310" text-anchor="middle" font-size="12" fill="#083344">
