  </text>

  <rect x="550" y="335" width="260" height="40" rx="6" fill="#ffffff" stroke="#0891b2" stroke-width="1.5"/>
  <text x="680" y="360" text-anchor="middle" font-size="12" fill="#083344">
    Decision Result Envelope
  </text>

  <!-- Audit Ledger -->
  <rect x="340" y="410" width="300" height="70" rx="8" fill="#fffbeb" stroke="#92400e" stroke-width="2"/>
  <text x="490" y="440" text-anchor="middle" font-size="14" fill="#78350f">
