  <!-- AI Systems -->
  <rect x="290" y="520" width="400" height="70" rx="8" fill="#ede9fe" stroke="#5b21b6" stroke-width="2"/>
  <text x="490" y="552" text-anchor="middle" font-size="16" fill="#4c1d95">
